name: Refresh Character Data

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest character data
        env:
          TOMESTONE_API_KEY: ${{ secrets.TOMESTONE_API_KEY }}
          FFLOGS_CLIENT_ID: ${{ secrets.FFLOGS_CLIENT_ID }}
          FFLOGS_CLIENT_SECRET: ${{ secrets.FFLOGS_CLIENT_SECRET }}
          XIVAPI_API_KEY: ${{ secrets.XIVAPI_API_KEY }}
        run: node scripts/fetch-data.js

      - name: Commit updated data
        run: |
          if git diff --quiet src/data/character.json src/data/achievements.json; then
            echo "No data changes, skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/character.json src/data/achievements.json
            git commit -m "chore: refresh character data [skip ci]"
            git push
            echo "data_updated=true" >> $GITHUB_OUTPUT
          fi
        id: commit

      - name: Trigger deploy
        if: steps.commit.outputs.data_updated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            })
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
