name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get FFLogs access token
        run: |
          TOKEN_RESPONSE=$(curl -s -u "${{ secrets.FFLOGS_CLIENT_ID }}:${{ secrets.FFLOGS_CLIENT_SECRET }}" \
            -d grant_type=client_credentials \
            https://www.fflogs.com/oauth/token)
          FFLOGS_TOKEN=$(echo "$TOKEN_RESPONSE" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
          echo "FFLOGS_TOKEN=$FFLOGS_TOKEN" >> $GITHUB_ENV

      - name: Build
        env:
          VITE_TOMESTONE_API_KEY: ${{ secrets.TOMESTONE_API_KEY }}
          VITE_XIVAPI_KEY: ${{ secrets.XIVAPI_KEY }}
          VITE_FFLOGS_TOKEN: ${{ env.FFLOGS_TOKEN }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
