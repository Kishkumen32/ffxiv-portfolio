<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kish Baiheur — FFXIV Portfolio</title>
    <script>
      (function() {
        var base = '/ffxiv-portfolio';
        var path = location.pathname.indexOf(base) === 0
          ? location.pathname.slice(base.length)
          : location.pathname;
        var target = base + '/#' + (path || '/');

        if (location.search) {
          target += location.search;
        }

        if (location.hash) {
          target += location.hash;
        }

        location.replace(target);
      })();
    </script>
  </head>

    Redirecting...
  </body>
</html>
